front:
  text: 指要鈔序宋東山沙門遵式述大教隆夷存乎其人諸祖既往玄化幾息時不可以久替必有間世者出焉四明傳教導師禮公實教門之偉人也童子受經便能思義天機特發不曰生知之上性者乎及進具稟學於寶雲通師初預法席厥父夢其跪于師前師執瓶水注於口中其引若泉其受若谷於是乎天台大教圓頓之旨一受即了不俟再聞師謂之曰子於吾言無所不達非助我也逮師始滅公復夢貫師之首擐于左臂而行嘻得非初表受習若阿難瀉水分瓶之莫二也後表傳持操師種智之首而行化也淳化初郡之乾符寺請開講席諸子悅隨若衆流會海繇是堂舍側陋門徒漸繁未幾遂遷于保恩院焉法華止觀金光明諸部連環講貫歲無虛日嘗勗其徒曰吾之或出或處或默或語未始不以教觀權實之旨為服味焉為杖几焉汝無怠也大哉若夫被寂忍之衣據大慈之室循循善誘不可得而稱矣釋籤十不二門者今昔講流以為一難文也或多注釋各陳異端孰不自謂握靈蛇之珠揮彌天之筆豈思夫一家教觀殊不知其啓發之所公覽之再歎豈但釋文未允奈何委亂大綱山隤角崩良用悲痛將欲正舉捨我而誰遂而正析斯文旁援顯據綽有餘刃兼整大途教門權實今時同昧者於茲判矣別理隨緣其類也觀道所託連代共迷者於茲見矣指要所以其立也至若法華止觀綱格之文隱括錯綜略無不在後之學者足以視近見遠染指知味易不云乎通天下之志定天下之業斷天下之疑實此一二萬言得矣式忝同學也觀者無謂吾之亦有黨乎取長其理無取長其情文理明白誰能隱乎云也
