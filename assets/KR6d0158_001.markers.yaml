  - {type: variant, offset: 3324, length: 84, content: 元本云：「此乃又超得髓之說也，可師之見，意縱階此，語且未圓。」問：「今明圓教，豈不論斷惑證理及翻迷就悟邪？若論者，何異持、育之解？」答：「秖如可師豈不斷惑翻迷？豈亦同前二邪？故知凡分漸頓，蓋論能斷能翻之所以爾。」, 甲: ''}
